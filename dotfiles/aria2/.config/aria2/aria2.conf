## -----------------------
## Basic Settings
## -----------------------

# The folder where all your downloaded files will be saved.
dir=/home/rcsaquino/Downloads/aria2

# Pick up right where it left off instead of starting over.
continue=true

# How many different files you can download at the exact same time.
max-concurrent-downloads=5

# How many invisible "straws" we use to suck down a single file. More straws = faster download!
max-connection-per-server=16

# The maximum number of chunks a single file can be chopped into.
split=16

# Cut files into chunks this big so we can download all the chunks at the same time.
min-split-size=2M

# If a download link fails, try using it again later.
reuse-uri=true

# If a file is completely broken, give up after trying 5 times.
max-tries=5

# Wait 3 seconds before trying a broken link again.
retry-wait=3

# Skip looking for secret password files on your computer to save time.
no-netrc=true

# Ask the internet for the freshest, newest version of the file.
http-no-cache=true

# Use modern internet addresses (IPv6) if your Wi-Fi supports it.
disable-ipv6=false

# Find website addresses super fast using your computer's phonebook.
async-dns=true

# Keep special characters and emojis in file names looking correct.
content-disposition-default-utf8=true

# Keep the original creation date of the file from when it was made on the internet.
remote-time=true

# Allow downloading a list of files with numbers in their names easily.
parameterized-uri=true

# If a file with the same name already exists, add a number to the end (like movie.1.mp4).
auto-file-renaming=true

# Let the file chunks change sizes if the website updates them halfway through.
allow-piece-length-change=true


## -----------------------
## Screen & Diary Settings
## -----------------------

# Only show important warnings on the screen. Keep everything else quiet.
console-log-level=warn

# Update the text on the screen every 60 seconds so you know it isn't frozen.
summary-interval=60
show-console-readout=true

# Show file sizes in easy-to-read numbers (like "2 Megabytes").
human-readable=true

# When the download is finished, print a nice summary box showing exactly what worked and what failed.
download-result=full

# Keep a secret diary of everything that happens in the background.
log=/home/rcsaquino/.config/aria2/aria2.log
log-level=notice


## -----------------------
## Torrent Settings
## -----------------------

# Look for people on your own home Wi-Fi to share files with (makes it super fast).
bt-enable-lpd=true

# Let your computer trade lists of friends with other computers to find more peers.
enable-peer-exchange=true

# Wear a disguise! Pretend to be the popular "qBittorrent" app so nobody kicks you out.
peer-id-prefix=-qB5030-
peer-agent=qBittorrent/5.0.3

# Talk to a maximum of 150 people at the same time to get the file faster.
bt-max-peers=150

# Allow opening up to 250 small files at once without confusing the computer.
bt-max-open-files=250

# Scramble the download traffic so your internet provider can't slow it down on purpose.
bt-require-crypto=true
bt-min-crypto-level=arc4

# Use a giant worldwide map to find more people sharing files without a tracker.
enable-dht=true
enable-dht6=true

# Save the worldwide map to your hard drive so you don't have to rebuild it every time.
dht-file-path=/home/rcsaquino/.config/aria2/dht.dat

# The main gate to enter the worldwide map.
dht-entry-point=dht.transmissionbt.com:6881
dht-entry-point6=dht.transmissionbt.com:6881

# The specific doors on your computer used to accept incoming file pieces.
dht-listen-port=51413-51415
listen-port=51413-51415

# Share exactly as much as you took to be polite, then stop.
seed-ratio=1.0

# Download the very beginning and the very end of a file first. This helps verify it isn't broken.
bt-prioritize-piece=head,tail

# Automatically delete junk files you didn't want to download from a torrent folder.
bt-remove-unselected-file=true

# Check every single puzzle piece as it arrives to make sure it isn't broken or fake.
realtime-chunk-checksum=true

# Double-check your completed file to make sure it's perfect before sharing it.
bt-hash-check-seed=true

# Save "magnet links" to your computer so it remembers everything instantly.
bt-save-metadata=true

# A big master list of servers to help jumpstart your downloads.
bt-tracker=udp://tracker.opentrackr.org:1337/announce,udp://open.demonii.com:1337/announce,udp://tracker.openbittorrent.com:6969/announce,udp://exodus.desync.com:6969/announce,udp://tracker.torrent.eu.org:451/announce,udp://tracker.moeking.me:6969/announce,udp://p4p.arenabg.com:1337/announce,udp://tracker.tiny-vps.com:6969/announce


## -----------------------
## Speed & Performance Settings
## -----------------------

# Use a super-fast brain inside the Linux computer to manage internet traffic.
event-poll=epoll

# Read and write files directly using the computer's fast memory.
enable-mmap=true

# Only talk to safe, modern websites with good security locks.
min-tls-version=TLSv1.2

# Hold 128 Megabytes of file pieces in fast memory before dumping them onto the hard drive.
disk-cache=128M

# CRITICAL FIX: Set to 'none'. This forces massive files (like 45GB games) to start downloading INSTANTLY instead of freezing your terminal to carve out hard drive space.
file-allocation=none

# Only remember the last 500 downloads so the computer doesn't run out of memory.
max-download-result=500

# Put on a fake mustache and glasses! Tell websites you are using Google Chrome so they don't block you.
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/132.0.0.0 Safari/537.36"
