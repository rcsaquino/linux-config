[audio]
enable_sounds = true
sound_volume = 100

[bar.default]
margin_ends = 0
background_opacity = 0.0
shadow = false
capsule = true
capsule_padding = 12
capsule_opacity = 0.95
start = [ "launcher", "workspaces", "media"]
center = ["clock"]
end = [ "tray", "cpu", "ram", "notifications", "volume", "bluetooth", "network", "battery", "session" ]

[battery]
warning_threshold = 20

[control_center]
sidebar = "full"
sidebar_section = "none"

[dock]
enabled = true
active_monitor_only = true
auto_hide = true
reserve_space = false
show_dots = true
cross_axis_padding = 4
icon_size = 32
item_spacing = 4
shadow = false

[location]
auto_locate = true

[osd]
position = "bottom_center"

[plugins]
enabled = [ "noctalia/notes" ]

[shell]
polkit_agent = true

[shell.panel]
transparency_mode = "soft"
wallpaper_placement = "floating"
control_center_placement = "floating"
session_placement = "floating"
session_position = "center"
open_near_click_control_center = true

[shell.launcher]
categories = false

[theme]
mode = "dark"
source = "custom"
custom_palette = "cattpuccin-mocha-blue"

[theme.templates]
builtin_ids = [ "gtk3", "gtk4", "niri", "qt", "ghostty" ]
community_ids = [ "pi-agent", "zed", "discord", "steam", "telegram", "yazi" ]

[wallpaper]
directory = "~/linux-config/assets/wallpapers"

# === BAR WIDGETS ===

# START
[widget.launcher]
custom_image = "/usr/share/noctalia/assets/images/distros/arch.svg"
custom_image_colorize = true

[widget.workspaces]
display = "none"
pill_scale = 0.7

[widget.media]
hide_when_no_media = true
title_scroll = "on_hover"

# CENTER
[widget.clock]
format = "{:%a %d %b | %H:%M}"

# END
[widget.tray]
detached_panel = true
drawer = true

[widget.cpu]
show_label = false

[widget.ram]
show_label = false

[widget.notifications]
hide_when_no_unread = true

[widget.volume]
show_label = false

[widget.network]
show_label = false
